<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connecting | Luca Hayes Content Platform</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05070A;
    color:#FFFFFF;
    font-family:Arial, sans-serif;
    text-align:center;
}

.container{
    max-width:700px;
    padding:40px;
}

.logo{
    width:220px;
    margin-bottom:30px;
}

h1{
    color:#4FC3FF;
    margin-bottom:15px;
    font-size:32px;
}

.subtitle{
    color:#B8C2CC;
    font-size:18px;
    margin-bottom:30px;
}

.countdown{
    color:#00A8FF;
    font-size:24px;
    font-weight:bold;
    margin-bottom:30px;
}

.loader{
    width:60px;
    height:60px;
    border:4px solid rgba(79,195,255,0.15);
    border-top:4px solid #00A8FF;
    border-radius:50%;
    margin:0 auto 30px auto;
    animation:spin 1s linear infinite;
}

.footer{
    margin-top:40px;
    color:#777;
    font-size:14px;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

</style>

<script>

window.onload = function() {

    let seconds = 10;

    const countdown =
        document.getElementById("countdown");

    countdown.innerText =
        "Redirecting in 10 seconds...";

    const timer = setInterval(() => {

        seconds--;

        countdown.innerText =
            "Redirecting in " + seconds + " seconds...";

        if(seconds <= 0){

            clearInterval(timer);

            const params =
                window.location.search;

            window.location.href =
                "https://script.google.com/macros/s/AKfycbzWCGx_wYRLlG5upfGB_z7NBJ_oLfwhOUyoioBGqBaAf--B27HnupIswRXw7-LJMOUxdw/exec" + params;
        }

    },1000);

};

</script>

</head>

<body>

<div class="container">

```
<img src="logo.png"
     alt="Luca Hayes Content Platform"
     class="logo">

<h1>
    Connecting to Luca Hayes Content Platform
</h1>

<div class="loader"></div>

<div id="countdown" class="countdown">
    Redirecting in 10 seconds...
</div>

<div class="subtitle">
    Please wait while we securely connect your account
    and continue the authentication process.
</div>

<div class="footer">
    © 2025 Luca Hayes Content Platform
</div>
```

</div>

</body>
</html>
